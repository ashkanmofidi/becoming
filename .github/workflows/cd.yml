name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
        working-directory: packages/shared
      - name: Deploy to Vercel
        run: echo "Vercel auto-deploys from GitHub. This job validates before deploy."
