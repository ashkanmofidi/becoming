name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
        working-directory: packages/shared
      - name: Lint
        run: npx eslint packages/shared/src/ --ext .ts --max-warnings 0
        continue-on-error: true
