name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # ── Shared package ──────────────────────────────
      - name: "Shared: Type Check"
        run: npx tsc --noEmit
        working-directory: packages/shared

      - name: "Shared: Unit Tests"
        run: npx vitest run
        working-directory: packages/shared

      - name: "Shared: Lint"
        run: npx eslint src/ --ext .ts --max-warnings 0
        working-directory: packages/shared
        continue-on-error: true

      # ── Web app ─────────────────────────────────────
      - name: "Web: Build"
        run: npx next build
        working-directory: apps/web

      # TODO: Add E2E tests (Playwright) once configured in CI.
      # Will need a `playwright install --with-deps` step and
      # a running dev/preview server. See:
      # https://playwright.dev/docs/ci-intro
